spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: TestSecretKeyThatIsAtLeast256BitsLongForTestingPurposesOnly123456
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

cors:
  allowed-origins: http://localhost:3000

management:
  tracing:
    sampling:
      probability: 0.0

logging:
  level:
    root: WARN
    com.jobtracker: INFO
