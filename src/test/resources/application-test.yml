spring:
  threads:
    virtual:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: TestSecretKeyThatIsAtLeast256BitsLongForTestingPurposesOnly123456
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

cors:
  allowed-origins: http://localhost:3000

app:
  monitoring:
    prometheus-token: test-prometheus-token

management:
  tracing:
    sampling:
      probability: 0.0

logging:
  level:
    root: WARN
    com.jobtracker: INFO

resilience4j:
  ratelimiter:
    instances:
      authRegister:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authLogin:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authRefresh:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authForgotPassword:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authResetPassword:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authLogout:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
