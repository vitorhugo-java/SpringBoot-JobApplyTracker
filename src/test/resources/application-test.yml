spring:
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:h2:mem:jobtracker_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  secret: TestSecretKeyThatIsAtLeast256BitsLongForTestingPurposesOnly123456
  access-token-expiration-ms: 900000
  refresh-token-expiration-ms: 604800000

app:
  frontend:
    reset-password-url: http://localhost:5173/reset-password
  security:
    password-reset-token-expiration-hours: 24
  mail:
    enabled: false
  google-drive:
    client-id: test-google-client-id
    client-secret: test-google-client-secret
    redirect-uri: http://localhost:8080/api/v1/google-drive/oauth/callback
    oauth-complete-url: http://localhost:5173/settings/google-drive/callback

cors:
  allowed-origins: http://localhost:3000

management:
  tracing:
    sampling:
      probability: 0.0

logging:
  level:
    root: WARN
    com.jobtracker: INFO

resilience4j:
  ratelimiter:
    instances:
      authRegister:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authLogin:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authRefresh:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authForgotPassword:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authResetPassword:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
      authLogout:
        limit-for-period: 1000
        limit-refresh-period: 1m
        timeout-duration: 0
