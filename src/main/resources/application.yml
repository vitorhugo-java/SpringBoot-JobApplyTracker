spring:
  config:
    import: optional:file:.env[.properties]
  threads:
    virtual:
      enabled: true
  jmx:
    enabled: false
  jackson:
    default-property-inclusion: non_null
  application:
    name: job-tracker
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/jobtracker?createDatabaseIfNotExist=true&characterEncoding=UTF-8&useUnicode=true}
    username: ${DB_USERNAME:jobtracker}
    password: ${DB_PASSWORD:jobtracker}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        type.preferred_uuid_jdbc_type: BINARY
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail.from: ${MAIL_FROM:no-reply@example.com}
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          ssl:
            enable: ${MAIL_SMTP_SSL:true}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: 50

jwt:
  secret: ${JWT_SECRET:ThisIsAVeryLongSecretKeyForJWTTokensAndItMustBeAtLeast256BitsLong}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
  refresh-token-expiration-ms: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,https://jobapply-web.hugojava.dev}

app:
  api:
    base-url: ${APP_API_BASE_URL:https://jobapply-api.hugojava.dev}
  frontend:
    reset-password-url: ${APP_FRONTEND_RESET_PASSWORD_URL:https://your-frontend.com/reset-password}
  security:
    password-reset-token-expiration-hours: ${PASSWORD_RESET_TOKEN_EXPIRATION_HOURS:24}
  mail:
    enabled: ${APP_MAIL_ENABLED:true}
    from: ${APP_MAIL_FROM:no-reply@jobtracker.com}
  google-drive:
    client-id: ${GOOGLE_DRIVE_CLIENT_ID:}
    client-secret: ${GOOGLE_DRIVE_CLIENT_SECRET:}
    redirect-uri: ${GOOGLE_DRIVE_REDIRECT_URI:http://localhost:8080/api/v1/google-drive/oauth/callback}
    oauth-complete-url: ${GOOGLE_DRIVE_OAUTH_COMPLETE_URL:}
    authorization-uri: ${GOOGLE_DRIVE_AUTHORIZATION_URI:https://accounts.google.com/o/oauth2/v2/auth}
    token-uri: ${GOOGLE_DRIVE_TOKEN_URI:https://oauth2.googleapis.com/token}
    scopes: ${GOOGLE_DRIVE_SCOPES:https://www.googleapis.com/auth/drive,https://www.googleapis.com/auth/documents.readonly}
  gpt-oauth:
    client-id: ${OPENAI_GPT_CLIENT_ID:}
    client-secret: ${OPENAI_GPT_CLIENT_SECRET:}
    redirect-uris: ${OPENAI_GPT_REDIRECT_URIS:}
    scopes: ${OPENAI_GPT_SCOPES:read:profile,read:applications,write:applications,read:resume,read:google-drive,read:metrics}
    issuer: ${OPENAI_GPT_ISSUER:${app.api.base-url}}
    audience: ${OPENAI_GPT_AUDIENCE:jobtracker-gpt-actions}
    authorization-code-expiration-seconds: ${OPENAI_GPT_AUTHORIZATION_CODE_EXPIRATION_SECONDS:300}
    access-token-expiration-seconds: ${OPENAI_GPT_ACCESS_TOKEN_EXPIRATION_SECONDS:900}
  webauthn:
    rp-id: ${APP_WEBAUTHN_RP_ID:localhost}
    rp-name: ${APP_WEBAUTHN_RP_NAME:JobApplyTracker}
    origins:
      - ${APP_WEBAUTHN_ORIGIN_1:http://localhost:3000}
      - ${APP_WEBAUTHN_ORIGIN_2:http://localhost:5173}
      - ${APP_WEBAUTHN_ORIGIN_3:https://jobapply-web.hugojava.dev}
    challenge-timeout-seconds: ${APP_WEBAUTHN_CHALLENGE_TIMEOUT_SECONDS:300}

management:
  server:
    port: ${MANAGEMENT_PORT:8081}
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
    jmx:
      exposure:
        exclude: '*'
  endpoint:
    health:
      show-details: when_authorized
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4317}
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true

resilience4j:
  ratelimiter:
    instances:
      authRegister:
        limit-for-period: ${RATE_LIMIT_AUTH_REGISTER_LIMIT_FOR_PERIOD:5}
        limit-refresh-period: ${RATE_LIMIT_AUTH_REGISTER_REFRESH_PERIOD:1m}
        timeout-duration: ${RATE_LIMIT_AUTH_REGISTER_TIMEOUT_DURATION:0}
      authLogin:
        limit-for-period: ${RATE_LIMIT_AUTH_LOGIN_LIMIT_FOR_PERIOD:10}
        limit-refresh-period: ${RATE_LIMIT_AUTH_LOGIN_REFRESH_PERIOD:1m}
        timeout-duration: ${RATE_LIMIT_AUTH_LOGIN_TIMEOUT_DURATION:0}
      authRefresh:
        limit-for-period: ${RATE_LIMIT_AUTH_REFRESH_LIMIT_FOR_PERIOD:20}
        limit-refresh-period: ${RATE_LIMIT_AUTH_REFRESH_REFRESH_PERIOD:1m}
        timeout-duration: ${RATE_LIMIT_AUTH_REFRESH_TIMEOUT_DURATION:0}
      authForgotPassword:
        limit-for-period: ${RATE_LIMIT_AUTH_FORGOT_PASSWORD_LIMIT_FOR_PERIOD:3}
        limit-refresh-period: ${RATE_LIMIT_AUTH_FORGOT_PASSWORD_REFRESH_PERIOD:1m}
        timeout-duration: ${RATE_LIMIT_AUTH_FORGOT_PASSWORD_TIMEOUT_DURATION:0}
      authResetPassword:
        limit-for-period: ${RATE_LIMIT_AUTH_RESET_PASSWORD_LIMIT_FOR_PERIOD:5}
        limit-refresh-period: ${RATE_LIMIT_AUTH_RESET_PASSWORD_REFRESH_PERIOD:1m}
        timeout-duration: ${RATE_LIMIT_AUTH_RESET_PASSWORD_TIMEOUT_DURATION:0}
      authLogout:
        limit-for-period: ${RATE_LIMIT_AUTH_LOGOUT_LIMIT_FOR_PERIOD:20}
        limit-refresh-period: ${RATE_LIMIT_AUTH_LOGOUT_REFRESH_PERIOD:1m}
        timeout-duration: ${RATE_LIMIT_AUTH_LOGOUT_TIMEOUT_DURATION:0}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  group-configs:
    - group: auth
      display-name: Auth API
      paths-to-match: /api/v1/auth/**
    - group: dashboard
      display-name: Dashboard API
      paths-to-match: /api/v1/dashboard/**
    - group: gamification
      display-name: Gamification API
      paths-to-match: /api/v1/gamification/**