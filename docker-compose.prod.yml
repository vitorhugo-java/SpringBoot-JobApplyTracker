# docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  app:
    # Pull pre-built image from GitHub Container Registry instead of building locally
    image: ghcr.io/vitorhugo-java/springboot-jobapplytracker:latest
    container_name: job-tracker-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-900000}
      JWT_REFRESH_TOKEN_EXPIRATION_MS: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:-604800000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://jaeger:4317}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://prometheus:9090}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-00}
      MAIL_USERNAME: ${MAIL_USERNAME:-00}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_HOST: ${MAIL_HOST:-localhost}
      MAIL_SMTP_SSL: ${MAIL_SMTP_SSL:-true}
      MAIL_FROM: ${MAIL_FROM:-no-reply@example.com}
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:+ExitOnOutOfMemoryError
        -Djava.security.egd=file:/dev/./urandom
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
